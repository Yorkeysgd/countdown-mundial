<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador Mundial 2026</title>

<style>
@font-face {
  font-family: 'Myriad Pro';
  src: url('fonts/MyriadPro-Regular.otf') format('opentype');
}

body {
  margin: 0;
  background-image: url('images/back.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: 'Myriad Pro', sans-serif;
  color: white;
  text-align: center;
  min-height: 100vh;
}

.container {
  margin-top: 129px;
}

.days {
  font-size: 385px;
  font-weight: 600;
}

.label-days {
  font-size: 97px;
  margin-top: -20px;
}

.para {
  margin-top: 246px;
  font-weight: 700;
  font-size: 78px;
}

.fifa-text {
  font-size: 63px;
  font-weight: 700;
  margin-top: 43px;
}
</style>
</head>

<body>

<div class="container">
  <div id="days" class="days">000</div>
  <div class="label-days">DÍAS</div>

  <div class="para">PARA</div>
  <div class="fifa-text">FIFA WORLD CUP 2026</div>
</div>

<script>
const targetDate = new Date("June 11, 2026 00:00:00").getTime();

function updateCounter() {
  const now = new Date().getTime();
  const difference = targetDate - now;
  const days = Math.floor(difference / (1000 * 60 * 60 * 24));

  document.getElementById("days").textContent = days;
}

updateCounter();
setInterval(updateCounter, 1000);
</script>

</body>
</html>
